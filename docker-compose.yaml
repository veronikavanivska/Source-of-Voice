services:

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    depends_on:
      - auth
      - sourceofvoice
      - payment
      - redis
    env_file:
      - .env
    environment:
      SPRING_APPLICATION_NAME: ${GATEWAY_SPRING_APPLICATION_NAME}
      SERVER_PORT: ${GATEWAY_SERVER_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_DURATION: ${JWT_DURATION}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      SOURCEOFVOICE_SERVICE_URL: ${SOURCEOFVOICE_SERVICE_URL}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_DATABASE: ${REDIS_DATABASE}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_DATA_REDIS_TIMEOUT: ${REDIS_TIMEOUT}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS}
    ports:
      - "8888:8080"
    networks:
      - sourceofvoice

  auth:
    build: ./auth
    container_name: auth
    depends_on:
      - auth-postgres
      - redis
    env_file:
      - .env
    environment:
      SPRING_APPLICATION_NAME: ${AUTH_SPRING_APPLICATION_NAME}
      SPRING_DATASOURCE_URL: ${AUTH_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${AUTH_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_DATASOURCE_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${AUTH_DATASOURCE_DRIVER}
      JWT_SECRET: ${JWT_SECRET}
      JWT_DURATION: ${JWT_DURATION}
      REFRESH_DURATION: ${REFRESH_DURATION}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_DATABASE: ${REDIS_DATABASE}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_DATA_REDIS_TIMEOUT: ${REDIS_TIMEOUT}
    networks:
      - sourceofvoice
      - auth-postgres-n

  sourceofvoice:
    build: ./sourceofvoice
    container_name: sourceofvoice
    depends_on:
      - sourceofvoice-postgres
      - minio
      - payment
    env_file:
      - .env
    environment:
      SPRING_APPLICATION_NAME: ${SOURCEOFVOICE_SPRING_APPLICATION_NAME}
      SPRING_R2DBC_URL: ${SOURCEOFVOICE_R2DBC_URL}
      SPRING_R2DBC_USERNAME: ${SOURCEOFVOICE_R2DBC_USERNAME}
      SPRING_R2DBC_PASSWORD: ${SOURCEOFVOICE_R2DBC_PASSWORD}
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_URL: ${SOURCEOFVOICE_FLYWAY_URL}
      SPRING_FLYWAY_USER: ${SOURCEOFVOICE_FLYWAY_USER}
      SPRING_FLYWAY_PASSWORD: ${SOURCEOFVOICE_FLYWAY_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL}
      SPEECHMATICS_BASE_URL: ${SPEECHMATICS_BASE_URL}
      SPEECHMATICS_API_KEY: ${SPEECHMATICS_API_KEY}
      AUDIO_TEXT_MAX_APPROVED_SUBMISSIONS: ${AUDIO_TEXT_MAX_APPROVED_SUBMISSIONS}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL}
      PAYMENT_INTERNAL_SECRET: ${PAYMENT_INTERNAL_SECRET}
      SPRING_WEBFLUX_MULTIPART_MAXINMEMORYSIZE: ${SPRING_WEBFLUX_MULTIPART_MAXINMEMORYSIZE}
      SPRING_WEBFLUX_MULTIPART_MAXDISKUSAGEPERPART: ${SPRING_WEBFLUX_MULTIPART_MAXDISKUSAGEPERPART}
      SPRING_WEBFLUX_MULTIPART_MAXPARTS: ${SPRING_WEBFLUX_MULTIPART_MAXPARTS}
      SPRING_WEBFLUX_MULTIPART_FILESTORAGEDIRECTORY: ${SPRING_WEBFLUX_MULTIPART_FILESTORAGEDIRECTORY}
    networks:
      - sourceofvoice
      - sourceofvoice-postgres-n

  payment:
    build: ./payment
    container_name: payment
    depends_on:
      - payment-postgres
    env_file:
      - .env
    environment:
      SPRING_APPLICATION_NAME: ${PAYMENT_SPRING_APPLICATION_NAME}
      SPRING_R2DBC_URL: ${PAYMENT_R2DBC_URL}
      SPRING_R2DBC_USERNAME: ${PAYMENT_R2DBC_USERNAME}
      SPRING_R2DBC_PASSWORD: ${PAYMENT_R2DBC_PASSWORD}
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_URL: ${PAYMENT_FLYWAY_URL}
      SPRING_FLYWAY_USER: ${PAYMENT_FLYWAY_USER}
      SPRING_FLYWAY_PASSWORD: ${PAYMENT_FLYWAY_PASSWORD}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      PAYMENT_MAX_AUDIO_REWARD: ${PAYMENT_MAX_AUDIO_REWARD}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      SOURCEOFVOICE_SERVICE_URL: ${SOURCEOFVOICE_SERVICE_URL}
    networks:
      - sourceofvoice
      - payment-postgres-n

  payment-postgres:
    image: postgres
    container_name: payment-postgres-sourceofvoice
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_PAYMENT_DB}
      POSTGRES_USER: ${POSTGRES_PAYMENT_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PAYMENT_PASSWORD}
    networks:
      - payment-postgres-n
    volumes:
      - payment_service_postgres:/var/lib/postgresql/data

  auth-postgres:
    image: postgres
    container_name: "auth-postgres-sourceofvoice"
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_AUTH_DB}
      POSTGRES_USER: ${POSTGRES_AUTH_USER}
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
    networks:
      - auth-postgres-n
    volumes:
      - auth_service_postgres:/var/lib/postgresql/data

  sourceofvoice-postgres:
    image: postgres
    container_name: "sourceofvoice-postgres-sourceofvoice"
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_SOURCEOFVOICE_DB}
      POSTGRES_USER: ${POSTGRES_SOURCEOFVOICE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_SOURCEOFVOICE_PASSWORD}
    networks:
      - sourceofvoice-postgres-n
    volumes:
      - sourceofvoice_service_postgres:/var/lib/postgresql/data


  redis:
    image: redis:latest
    container_name: refresh_token_redis
    ports:
       - "6379:6379"
    networks:
       - sourceofvoice
    volumes:
      - redis-data:/data
    command: [ "redis-server", "--save", "60", "1", "--loglevel", "warning" ]

  minio:
    image: minio/minio:latest
    container_name: "sourceofvoice-minio"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: ["server", "/data", "--console-address", ":9001"]
    networks:
      - sourceofvoice
    volumes:
      - minio-data:/data

volumes:
  auth_service_postgres:
  sourceofvoice_service_postgres:
  redis-data:
  minio-data:
  payment_service_postgres:


networks:
  sourceofvoice:
    driver: bridge
  auth-postgres-n:
    driver: bridge
  sourceofvoice-postgres-n:
    driver: bridge
  payment-postgres-n:
    driver: bridge
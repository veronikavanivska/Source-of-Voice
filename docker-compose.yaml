services:
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8888:8080"
    networks:
      - sourceofvoice

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    networks:
      - sourceofvoice
      - auth-postgres-n

  auth-postgres:
    image: postgres
    container_name: "auth-postgres-sourceofvoice"
    ports:
      - "5433:5432"
    networks:
      - auth-postgres-n
    volumes:
      - auth_service_postgres:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: refresh_token_redis
    ports:
       - "6379:6379"
    networks:
       - sourceofvoice
    volumes:
      - redis-data:/data
    command: [ "redis-server", "--save", "60", "1", "--loglevel", "warning" ]

volumes:
  auth_service_postgres:
  redis-data:

networks:
  sourceofvoice:
    driver: bridge
  auth-postgres-n:
    driver: bridge